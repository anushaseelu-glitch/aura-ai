<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Talk to Your World</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #080c14;
  --bg1: #0e1422;
  --bg2: #141b2e;
  --bg3: #1b2340;
  --card: #111827;
  --border: rgba(99,179,237,0.15);
  --border-bright: rgba(99,179,237,0.4);
  --accent1: #63b3ed;
  --accent2: #f6ad55;
  --accent3: #68d391;
  --accent4: #fc8181;
  --accent5: #b794f4;
  --text1: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --glow: 0 0 20px rgba(99,179,237,0.25);
  --glow2: 0 0 40px rgba(99,179,237,0.12);
  --shadow: 0 8px 40px rgba(0,0,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; background: var(--bg0); color: var(--text1); }

/* === CANVAS BG === */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* === LAYOUT === */
.app { display: flex; height: 100vh; position: relative; z-index: 1; }

/* === SIDEBAR === */
.sidebar {
  width: 320px; min-width: 320px; background: rgba(14,20,34,0.97);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  backdrop-filter: blur(20px);
}
.sidebar-header {
  padding: 20px 20px 16px; border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, #63b3ed, #b794f4); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px;
}
.logo-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 3px; margin-top: 2px; }

.search-box {
  margin: 14px 16px 0; position: relative;
}
.search-box input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 14px 9px 36px; font-family: 'Nunito', sans-serif;
  font-size: 13px; color: var(--text1); outline: none;
  transition: border 0.2s, box-shadow 0.2s;
}
.search-box input:focus { border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(99,179,237,0.1); }
.search-box input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.4; font-size: 15px; }

.category-tabs {
  display: flex; gap: 6px; padding: 14px 16px 8px; overflow-x: auto;
  scrollbar-width: none;
}
.category-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0; padding: 5px 13px; border-radius: 20px; font-size: 11px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer;
  border: 1px solid var(--border); color: var(--text3);
  transition: all 0.2s; background: transparent;
  font-family: 'Nunito', sans-serif;
}
.cat-tab:hover, .cat-tab.active {
  background: rgba(99,179,237,0.12); border-color: var(--accent1); color: var(--accent1);
}

.char-list { flex: 1; overflow-y: auto; padding: 8px 10px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
.char-card {
  display: flex; align-items: center; gap: 12px; padding: 11px 12px;
  border-radius: 14px; cursor: pointer; transition: all 0.25s; border: 1px solid transparent;
  margin-bottom: 4px; position: relative;
}
.char-card:hover { background: var(--bg2); border-color: var(--border); }
.char-card.active { background: linear-gradient(135deg, rgba(99,179,237,0.1), rgba(183,148,244,0.08)); border-color: var(--border-bright); box-shadow: var(--glow); }

.char-avatar {
  width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; position: relative; overflow: hidden;
  border: 2px solid transparent;
}
.char-avatar.online::after {
  content: ''; position: absolute; bottom: 2px; right: 2px;
  width: 10px; height: 10px; border-radius: 50%; background: var(--accent3);
  border: 2px solid var(--bg1); box-shadow: 0 0 6px var(--accent3);
}
.char-info { flex: 1; min-width: 0; }
.char-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-role { font-size: 11px; color: var(--text3); margin-top: 1px; }
.char-mood { font-size: 10px; margin-top: 3px; opacity: 0.7; }
.char-badge {
  font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
}

/* === MAIN CHAT AREA === */
.chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

/* Character header */
.chat-header {
  padding: 0 28px; height: 78px; display: flex; align-items: center; gap: 18px;
  background: rgba(14,20,34,0.95); border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); position: relative; flex-shrink: 0;
}
.chat-header-avatar {
  width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 26px; flex-shrink: 0;
  border: 2px solid var(--border-bright); box-shadow: var(--glow);
  position: relative;
}
.chat-header-avatar .pulse-ring {
  position: absolute; inset: -5px; border-radius: 50%;
  border: 1.5px solid rgba(99,179,237,0.3);
  animation: pulse-ring 2.5s ease-out infinite;
}
@keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }

.chat-header-info { flex: 1; }
.chat-header-name { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 600; letter-spacing: 1px; }
.chat-header-status { font-size: 12px; color: var(--accent3); margin-top: 2px; }
.chat-header-desc { font-size: 11px; color: var(--text3); margin-top: 2px; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.header-stats { display: flex; gap: 20px; margin-left: auto; }
.h-stat { text-align: center; }
.h-stat-val { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 600; }
.h-stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-top: 1px; }

/* Messages */
.messages-area {
  flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 18px;
  scrollbar-width: thin; scrollbar-color: var(--bg3) transparent;
}
.msg { display: flex; gap: 14px; align-items: flex-end; animation: msgIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes msgIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: none; } }
.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 17px;
  border: 1.5px solid var(--border);
}
.msg-content { max-width: 65%; display: flex; flex-direction: column; gap: 4px; }
.msg.user .msg-content { align-items: flex-end; }

.bubble {
  padding: 13px 17px; border-radius: 18px; line-height: 1.6; font-size: 14px;
  position: relative; word-break: break-word;
}
.msg.bot .bubble {
  background: var(--bg2); border: 1px solid var(--border);
  border-bottom-left-radius: 5px;
}
.msg.user .bubble {
  background: linear-gradient(135deg, #2b6cb0, #553c9a);
  border-bottom-right-radius: 5px; color: #e2e8f0;
}
.msg-meta { font-size: 10px; color: var(--text3); padding: 0 4px; }
.msg.user .msg-meta { text-align: right; }

/* Typing indicator */
.typing-indicator { display: flex; gap: 14px; align-items: flex-end; }
.typing-bubble { background: var(--bg2); border: 1px solid var(--border); padding: 13px 17px; border-radius: 18px; border-bottom-left-radius: 5px; display: flex; gap: 5px; align-items: center; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent1); animation: td 1.2s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes td { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* Input area */
.chat-input-area {
  padding: 16px 24px 20px; background: rgba(14,20,34,0.95);
  border-top: 1px solid var(--border); backdrop-filter: blur(20px); flex-shrink: 0;
}
.quick-prompts {
  display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none;
}
.quick-prompts::-webkit-scrollbar { display: none; }
.qp-btn {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 11px;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
  cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif;
  white-space: nowrap;
}
.qp-btn:hover { border-color: var(--accent1); color: var(--accent1); background: rgba(99,179,237,0.08); }

.input-row { display: flex; gap: 10px; align-items: flex-end; }
.msg-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 13px 16px; font-family: 'Nunito', sans-serif;
  font-size: 14px; color: var(--text1); outline: none; resize: none;
  max-height: 120px; min-height: 48px; line-height: 1.5;
  transition: border 0.2s, box-shadow 0.2s;
  scrollbar-width: thin;
}
.msg-input:focus { border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(99,179,237,0.1); }
.msg-input::placeholder { color: var(--text3); }

.send-btn {
  width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, #2b6cb0, #553c9a);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; transition: all 0.2s; box-shadow: var(--glow);
}
.send-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(99,179,237,0.4); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* === RIGHT PANEL === */
.right-panel {
  width: 280px; min-width: 280px; background: rgba(14,20,34,0.97);
  border-left: 1px solid var(--border); display: flex; flex-direction: column;
  backdrop-filter: blur(20px); overflow-y: auto; scrollbar-width: thin;
}
.panel-section { padding: 20px 18px; border-bottom: 1px solid var(--border); }
.panel-title { font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }

/* Character card in right panel */
.char-profile { text-align: center; }
.big-avatar {
  width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center; font-size: 44px;
  border: 3px solid var(--border-bright); box-shadow: var(--glow2);
  position: relative;
}
.big-avatar-emoji { line-height: 1; }
.profile-name { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.profile-role { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
.profile-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.tag { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* Stats bars */
.stat-bar-row { margin-bottom: 10px; }
.stat-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-bar-track { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }

/* Mood panel */
.mood-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.mood-btn { padding: 6px 12px; border-radius: 10px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text2);
  transition: all 0.2s; font-family: 'Nunito', sans-serif; }
.mood-btn:hover, .mood-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(246,173,85,0.1); }

/* Welcome screen */
.welcome-screen {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 40px; gap: 20px;
}
.welcome-title { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, #63b3ed, #b794f4, #f6ad55);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.2;
}
.welcome-sub { font-size: 15px; color: var(--text2); max-width: 420px; line-height: 1.7; }
.welcome-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 10px; max-width: 600px; }
.wc { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 18px 14px; cursor: pointer; transition: all 0.25s; }
.wc:hover { border-color: var(--border-bright); transform: translateY(-3px); box-shadow: var(--glow); }
.wc-emoji { font-size: 32px; margin-bottom: 10px; }
.wc-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.wc-desc { font-size: 11px; color: var(--text3); }

/* Notification toast */
.toast {
  position: fixed; bottom: 30px; right: 30px; background: var(--bg2);
  border: 1px solid var(--border-bright); border-radius: 12px; padding: 12px 18px;
  font-size: 13px; color: var(--text1); z-index: 1000;
  transform: translateY(80px); opacity: 0; transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--shadow);
}
.toast.show { transform: none; opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* Error state */
.error-bubble { background: rgba(252,129,129,0.1); border-color: rgba(252,129,129,0.3); color: #fc8181; }

/* Responsive */
@media (max-width: 1100px) { .right-panel { display: none; } }
@media (max-width: 750px) { .sidebar { width: 240px; min-width: 240px; } }
@media (max-width: 560px) { .sidebar { display: none; } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">AURA</div>
      <div class="logo-sub">AI Character Universe</div>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search characters..." oninput="filterChars(this.value)">
    </div>
    <div class="category-tabs" id="catTabs">
      <button class="cat-tab active" onclick="filterByCategory('all', this)">All</button>
      <button class="cat-tab" onclick="filterByCategory('school', this)">School</button>
      <button class="cat-tab" onclick="filterByCategory('professional', this)">Pro</button>
      <button class="cat-tab" onclick="filterByCategory('fantasy', this)">Fantasy</button>
      <button class="cat-tab" onclick="filterByCategory('anime', this)">Anime</button>
    </div>
    <div class="char-list" id="charList"></div>
  </div>

  <!-- MAIN -->
  <div class="chat-main" id="chatMain">
    <div id="welcomeScreen" class="welcome-screen">
      <div class="welcome-title">Choose Your<br>Character</div>
      <div class="welcome-sub">Talk to AI characters who remember your conversations, have unique personalities, and respond in character.</div>
      <div class="welcome-cards" id="featuredCards"></div>
    </div>

    <div id="chatInterface" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header" id="chatHeader"></div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-input-area">
        <div class="quick-prompts" id="quickPrompts"></div>
        <div class="input-row">
          <textarea class="msg-input" id="msgInput" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="rightPanel" style="display:none;">
    <div class="panel-section">
      <div class="panel-title">Character Profile</div>
      <div class="char-profile" id="charProfile"></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Personality Stats</div>
      <div id="statsPanel"></div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Conversation Mood</div>
      <div class="mood-selector" id="moodSelector">
        <button class="mood-btn active" onclick="setMood('friendly', this)">😊 Friendly</button>
        <button class="mood-btn" onclick="setMood('serious', this)">😐 Serious</button>
        <button class="mood-btn" onclick="setMood('funny', this)">😄 Playful</button>
        <button class="mood-btn" onclick="setMood('deep', this)">🤔 Deep</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-title">Quick Actions</div>
      <div style="display:flex; flex-direction:column; gap:8px;" id="quickActions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== CHARACTERS DATA =====================
const CHARACTERS = [
  {
    id: 'classmate',
    name: 'Riya Sharma',
    role: 'Your Classmate',
    category: 'school',
    emoji: '🎒',
    avatarBg: '#1a365d',
    avatarColor: '#63b3ed',
    badge: 'School',
    badgeColor: '#2b6cb0',
    mood: '📚 Studying for finals',
    desc: 'Sits next to you in class, always has the notes you missed',
    tags: ['Studious', 'Friendly', 'Notes Queen'],
    tagColors: ['#2b6cb0', '#276749', '#553c9a'],
    stats: { Friendliness: 90, Humor: 65, Intelligence: 85, Empathy: 80 },
    statColors: ['#63b3ed', '#68d391', '#b794f4', '#f6ad55'],
    quickPrompts: ['Can I borrow your notes?', 'Did you study for the exam?', 'What\'s your favorite subject?', 'Tell me something funny'],
    quickActions: ['Study together', 'Talk about school', 'Share gossip', 'Plan lunch'],
    systemPrompt: `You are Riya Sharma, a 20-year-old college student who is the user's classmate. You sit next to them in class. You're cheerful, studious, and a little nerdy but in a cool way. You always have good notes, love sharing study tips, and gossip about college life. You use casual college slang, mention assignments, professors, and college events. You remember things the user tells you. Be warm, relatable, and genuine. Sometimes use "omg", "lol", "btw" in your messages. Keep replies conversational — 2-4 sentences usually, longer when explaining something. Never break character.`
  },
  {
    id: 'friend',
    name: 'Arjun Mehta',
    role: 'School Best Friend',
    category: 'school',
    emoji: '🎮',
    avatarBg: '#1a2744',
    avatarColor: '#b794f4',
    badge: 'School',
    badgeColor: '#553c9a',
    mood: '🎮 On a gaming streak',
    desc: 'Your ride-or-die since 8th grade, knows all your secrets',
    tags: ['Loyal', 'Gamer', 'Hilarious'],
    tagColors: ['#276749', '#553c9a', '#744210'],
    stats: { Loyalty: 98, Humor: 95, Gaming: 90, Empathy: 72 },
    statColors: ['#68d391', '#b794f4', '#f6ad55', '#63b3ed'],
    quickPrompts: ['Bro what\'s up?', 'Let\'s game tonight', 'You won\'t believe what happened', 'Give me real advice'],
    quickActions: ['Roast me (lightly)', 'Plan hangout', 'Talk games', 'Vent session'],
    systemPrompt: `You are Arjun Mehta, a 20-year-old college student and the user's best friend since 8th grade. You're hilarious, brutally honest but always supportive, and obsessed with gaming. You know all their embarrassing stories and use them affectionately. You use lots of "bro", "dude", "man", casual banter, and gaming references. You give real advice when asked. Keep it real, keep it fun. 2-3 sentences usually, but go longer when sharing stories or advice. Never break character.`
  },
  {
    id: 'ceo',
    name: 'Alexandra Chen',
    role: 'Tech CEO',
    category: 'professional',
    emoji: '💼',
    avatarBg: '#1a1a2e',
    avatarColor: '#f6ad55',
    badge: 'Pro',
    badgeColor: '#744210',
    mood: '📊 Closing a Series B',
    desc: 'Built a $200M startup from a dorm room, mentor & visionary',
    tags: ['Visionary', 'Mentor', 'Ruthless'],
    tagColors: ['#744210', '#2b6cb0', '#702459'],
    stats: { Leadership: 97, Strategy: 93, Ambition: 99, Empathy: 68 },
    statColors: ['#f6ad55', '#63b3ed', '#fc8181', '#68d391'],
    quickPrompts: ['Give me startup advice', 'How did you build your company?', 'What\'s your morning routine?', 'Evaluate my idea'],
    quickActions: ['Pitch your idea', 'Career advice', 'Business strategy', 'Leadership talk'],
    systemPrompt: `You are Alexandra Chen, a 35-year-old self-made tech CEO who built a $200M SaaS company from scratch in college. You're sharp, direct, and visionary. You give no-nonsense advice and love helping people who show real drive. You occasionally mention your company, board meetings, investors, and your journey from dorm-room startup to success. You're inspiring but don't sugarcoat. Use professional but energetic language. Ask questions that make people think. Keep responses focused and impactful — no fluff. Never break character.`
  },
  {
    id: 'mentor',
    name: 'Prof. Srinivas',
    role: 'Wise Professor',
    category: 'professional',
    emoji: '🎓',
    avatarBg: '#1a2e1a',
    avatarColor: '#68d391',
    badge: 'Pro',
    badgeColor: '#276749',
    mood: '📖 Lost in a research paper',
    desc: 'IIT professor with 30 years of experience, loves deep conversations',
    tags: ['Wise', 'Patient', 'Philosophical'],
    tagColors: ['#276749', '#553c9a', '#744210'],

// ===================== CANVAS BACKGROUND =====================
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let stars = [], nebulas = [], animFrame;

function initCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 200}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.3 + 0.05,
    opacity: Math.random() * 0.7 + 0.2,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: (Math.random() - 0.5) * 0.04
  }));
  nebulas = [
    { x: canvas.width * 0.15, y: canvas.height * 0.3, r: 200, color: '99,130,237' },
    { x: canvas.width * 0.85, y: canvas.height * 0.7, r: 180, color: '183,148,244' },
    { x: canvas.width * 0.5, y: canvas.height * 0.1, r: 150, color: '99,179,237' }
  ];
}

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  nebulas.forEach(n => {
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, `rgba(${n.color},0.04)`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
  });
  stars.forEach(s => {
    s.twinkle += s.twinkleSpeed;
    const opacity = s.opacity + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${Math.max(0, Math.min(1, opacity))})`;
    ctx.fill();
  });
  animFrame = requestAnimationFrame(drawCanvas);
}

window.addEventListener('resize', () => { initCanvas(); });
initCanvas(); drawCanvas();

// ===================== SELECTION =====================
function selectCharacter(c) {
  currentChar = c;
  conversationHistory = [];
  currentMood = 'friendly';

  document.getElementById('welcomeScreen').style.display = 'none';
  const ci = document.getElementById('chatInterface');
  ci.style.display = 'flex';

  renderChatHeader(c);
  renderRightPanel(c);
  renderQuickPrompts(c);
  document.getElementById('messagesArea').innerHTML = '';

  // Update sidebar active state
  document.querySelectorAll('.char-card').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.char-card').forEach(el => {
    if (el.querySelector('.char-name').textContent === c.name) el.classList.add('active');
  });

  // Reset mood buttons
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.mood-btn').classList.add('active');

  // Welcome message
  setTimeout(() => {
    addBotMessage(getWelcomeMessage(c), c);
  }, 400);

  showToast(`Connected to ${c.name} ✓`);
}

// ===================== MESSAGING =====================
function addBotMessage(text, char, isError = false) {
  const area = document.getElementById('messagesArea');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg bot';
  msgDiv.innerHTML = `
    <div class="msg-avatar" style="background:${char.avatarBg}; border-color:${char.avatarColor}40;">${char.emoji}</div>
    <div class="msg-content">
      <div class="bubble${isError ? ' error-bubble' : ''}">${escapeHtml(text)}</div>
      <div class="msg-meta">${char.name} · ${getTime()}</div>
    </div>
  `;
  area.appendChild(msgDiv);
  area.scrollTop = area.scrollHeight;

  if (!isError) {
    conversationHistory.push({ role: 'assistant', content: text });
  }
}

function addUserMessage(text) {
  const area = document.getElementById('messagesArea');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg user';
  msgDiv.innerHTML = `
    <div class="msg-avatar" style="background:#1a2744; border-color:#63b3ed40;">👤</div>
    <div class="msg-content">
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="msg-meta">You · ${getTime()}</div>
    </div>
  `;
  document.getElementById('messagesArea').appendChild(msgDiv);
  document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
}

function showTyping() {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentChar.avatarBg}; border-color:${currentChar.avatarColor}40;">${currentChar.emoji}</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (!currentChar) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  addUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  const moodAddition = {
    friendly: ' Be warm and friendly.',
    serious: ' Keep your responses more serious and focused.',
    funny: ' Be playful and add some humor.',
    deep: ' Give deeper, more philosophical responses.'
  }[currentMood] || '';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: currentChar.systemPrompt + moodAddition,
        messages: conversationHistory.slice(-20)
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.content && data.content[0]) {
      addBotMessage(data.content[0].text, currentChar);
    } else if (data.error) {
      addBotMessage(`Connection error: ${data.error.message}`, currentChar, true);
    }
  } catch (err) {
    removeTyping();
    addBotMessage('Connection lost. Please check your network and try again.', currentChar, true);
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function sendQuick(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ===================== FILTERING =====================
function filterChars(query) {
  const q = query.toLowerCase();
  const filtered = CHARACTERS.filter(c =>
    (activeCategory === 'all' || c.category === activeCategory) &&
    (c.name.toLowerCase().includes(q) || c.role.toLowerCase().includes(q))
  );
  renderCharList(filtered);
}

function filterByCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'all' ? CHARACTERS : CHARACTERS.filter(c => c.category === cat);
  renderCharList(filtered);
}

// ===================== MOOD =====================
function setMood(mood, btn) {
  currentMood = mood;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showToast(`Mood set to ${mood}`);
}

// ===================== UTILS =====================
function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===================== INIT =====================
renderCharList(CHARACTERS);
